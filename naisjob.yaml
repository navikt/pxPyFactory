apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: pxpyfactory-storage-access
  namespace: dvh-analytisk-plattform
spec:
  member: serviceAccount:pxpyfactory-dvh-analyt-a36vfvy@nais-dev-2e7b.iam.gserviceaccount.com
  role: roles/storage.objectAdmin
  resourceRef:
    apiVersion: storage.cnrm.cloud.google.com/v1beta1
    kind: StorageBucket
    name: pxweb2-api-nais-px
---
apiVersion: nais.io/v1
kind: Naisjob
metadata:
  labels:
    team: dvh-analytisk-plattform
  name: pxpyfactory-job
  namespace: dvh-analytisk-plattform
spec:
  image: "{{ image }}"
  schedule: "*/5 6-19 * * 1-5"  # Commented out to run once on deployment only
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "1000m"
  env:
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: github-token
          key: GITHUB_TOKEN
  gcp:
    permissions:
      - resource:
          apiVersion: storage.cnrm.cloud.google.com/v1beta1
          kind: StorageBucket
          name: pxweb2-api-nais-px
        role: roles/storage.objectAdmin
