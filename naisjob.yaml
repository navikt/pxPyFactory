apiVersion: nais.io/v1
kind: Naisjob
metadata:
  labels:
    team: statistikkbank
  name: pxpyfactory-job
  namespace: statistikkbank
spec:
  image: "{{ image }}"
#  schedule: "*/5 6-19 * * 1-5"  # Commented out to run once on deployment only
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "1000m"
  envFrom:
    - secret: github-token
  gcp:
    buckets:
      # Input bucket - input and workfiles to pxPyFactory are stored here
      - name: pxpyfactory-input
        # No lifecycle rules - keep files indefinitely for API to serve
      
      # Output bucket - shared with pxWeb API, published PX files are stored here
      - name: pxpyfactory-output # "pxweb-api-input"
        # No lifecycle rules - keep files indefinitely for API to serve

